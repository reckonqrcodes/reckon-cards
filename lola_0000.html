
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOLA - ICard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    
                <div class="w-full max-w-[380px] bg-white rounded-[40px] shadow-2xl mx-auto overflow-hidden">
                    <div class="bg-orange-500 p-8 text-center text-white">
                        <img src="https://via.placeholder.com/150" class="w-28 h-28 rounded-full mx-auto border-4 border-white mb-4 object-cover shadow-xl">
                        <h3 class="text-2xl font-black">LOLA</h3>
                        <p class="font-bold text-xs uppercase tracking-widest mt-1 opacity-90">Designation | Company Name</p>
                    </div>
                    <div class="p-8">
                        <p class="text-slate-500 text-sm italic text-center mb-6">"Welcome to my digital profile."</p>
                        <div class="space-y-4">
                            <a href="tel:000-000-0000" class="flex items-center gap-4 bg-slate-50 p-3 rounded-xl border hover:bg-slate-100 transition">
                                <i class="fas fa-mobile-alt text-orange-500 w-5 text-center"></i><div class="overflow-hidden"><p class="text-[9px] uppercase font-bold text-slate-400">Mobile</p><p class="text-sm font-bold text-slate-800">000-000-0000</p></div>
                            </a>
                            <a href="tel:9999999999" class="flex items-center gap-4 bg-slate-50 p-3 rounded-xl border hover:bg-slate-100 transition">
                                <i class="fas fa-phone text-orange-500 w-5 text-center"></i><div class="overflow-hidden"><p class="text-[9px] uppercase font-bold text-slate-400">Work</p><p class="text-sm font-bold text-slate-800">9999999999</p></div>
                            </a>
                            <a href="mailto:email@example.com" class="flex items-center gap-4 bg-slate-50 p-3 rounded-xl border hover:bg-slate-100 transition">
                                <i class="fas fa-envelope text-orange-500 w-5 text-center"></i><div class="overflow-hidden"><p class="text-[9px] uppercase font-bold text-slate-400">Email</p><p class="text-sm font-bold text-slate-800 truncate block w-40">email@example.com</p></div>
                            </a>
                            <a href="https://example.com" target="_blank" class="flex items-center gap-4 bg-slate-50 p-3 rounded-xl border hover:bg-slate-100 transition">
                                <i class="fas fa-globe text-orange-500 w-5 text-center"></i><div class="overflow-hidden"><p class="text-[9px] uppercase font-bold text-slate-400">Website</p><p class="text-sm font-bold text-blue-600 truncate block w-40">example.com</p></div>
                            </a>
                            <a href="https://www.google.com/maps/search/?api=1&amp;query=City%2C%20State" target="_blank" class="flex items-center gap-4 bg-slate-50 p-3 rounded-xl border hover:bg-slate-100 transition">
                                <i class="fas fa-map-marker-alt text-orange-500 w-5 text-center"></i><div class="overflow-hidden"><p class="text-[9px] uppercase font-bold text-slate-400">Location</p><p class="text-sm font-bold text-slate-800 truncate block w-40">City, State</p></div>
                            </a>
                        </div>
                        <div class="text-orange-500"><div class="flex justify-center gap-5 mt-6"></div></div>
                        <button onclick="downloadVCard()" class="w-full mt-6 bg-orange-500 text-white font-black py-4 rounded-2xl shadow-xl uppercase tracking-widest text-[10px] hover:scale-105 transition active:scale-95"><i class="fas fa-user-plus mr-2"></i> Save Contact</button>
                    </div>
                </div>
    <script>function downloadVCard(){const blob=new Blob(["BEGIN:VCARD\nVERSION:3.0\nFN:LOLA\nORG:\nTITLE:\nTEL;TYPE=CELL:\nTEL;TYPE=WORK:9999999999\nEMAIL:\nURL:\nADR:;;;;;;\nEND:VCARD".replace(/\\n/g,'\n')],{type:'text/vcard'});const url=window.URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='LOLA.vcf';document.body.appendChild(a);a.click();window.URL.revokeObjectURL(url);}</script>
</body>
</html>
